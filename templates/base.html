<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Oficina{% endblock %} — Centro Automotivo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; }

    /* Sidebar */
    #sidebar {
      width: 240px; min-height: 100vh; background: #1a1f36;
      position: fixed; top: 0; left: 0; z-index: 100;
      display: flex; flex-direction: column;
      transition: width .25s;
    }
    #sidebar .brand {
      padding: 20px 16px 12px;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      border-bottom: 1px solid rgba(255,255,255,.1);
      display: flex; align-items: center; gap: 10px;
    }
    #sidebar .brand i { font-size: 1.5rem; color: #4f8ef7; }
    #sidebar .nav-link {
      color: rgba(255,255,255,.7); padding: 10px 20px;
      display: flex; align-items: center; gap: 10px;
      font-size: .9rem; transition: background .15s, color .15s;
      border-radius: 6px; margin: 2px 8px;
    }
    #sidebar .nav-link:hover, #sidebar .nav-link.active {
      background: rgba(79,142,247,.18); color: #fff;
    }
    #sidebar .nav-link i { font-size: 1.1rem; }

    /* Main */
    #main { margin-left: 240px; padding: 24px; }

    /* Topbar */
    .topbar {
      background: #fff; border-radius: 12px;
      padding: 12px 20px; margin-bottom: 24px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 1px 4px rgba(0,0,0,.07);
    }
    .topbar h5 { margin: 0; font-weight: 700; color: #1a1f36; }

    /* Stat cards */
    .stat-card {
      background: #fff; border-radius: 12px; padding: 18px 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,.07);
      display: flex; align-items: center; gap: 16px;
    }
    .stat-card .icon {
      width: 48px; height: 48px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
    }
    .stat-card .label { font-size: .78rem; color: #6c757d; margin-bottom: 2px; }
    .stat-card .value { font-size: 1.5rem; font-weight: 700; color: #1a1f36; }

    /* Flash messages */
    .flash-container { position: fixed; top: 16px; right: 16px; z-index: 9999; min-width: 280px; }

    /* Table */
    .table-card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
    .table thead th { background: #1a1f36; color: #fff; font-size: .8rem; text-transform: uppercase; letter-spacing: .04em; border: none; }
    .table tbody tr:hover { background: #f8f9ff; }
    .table td { vertical-align: middle; font-size: .88rem; }

    /* Status badges */
    .badge-aberta    { background: #fff3cd; color: #856404; }
    .badge-andamento { background: #cfe2ff; color: #084298; }
    .badge-concluida { background: #d1e7dd; color: #0a3622; }

    /* Filter card */
    .filter-card { background: #fff; border-radius: 12px; padding: 16px 20px; box-shadow: 0 1px 4px rgba(0,0,0,.07); margin-bottom: 20px; }

    /* Form sections */
    .section-title { font-size: .78rem; text-transform: uppercase; letter-spacing: .07em; color: #6c757d; font-weight: 700; margin-bottom: 12px; margin-top: 4px; }

    @media (max-width: 768px) {
      #sidebar { width: 60px; }
      #sidebar .brand span, #sidebar .nav-link span { display: none; }
      #main { margin-left: 60px; }
    }
  </style>
</head>
<body>

<!-- Sidebar -->
<nav id="sidebar">
  <div class="brand">
    <i class="bi bi-wrench-adjustable-circle-fill"></i>
    <span>Centro Auto</span>
  </div>
  <div class="mt-3">
    <a href="{{ url_for('index') }}" class="nav-link {% if request.endpoint == 'index' %}active{% endif %}">
      <i class="bi bi-speedometer2"></i><span>Dashboard</span>
    </a>
    <a href="{{ url_for('index') }}#nova-os" class="nav-link">
      <i class="bi bi-plus-circle"></i><span>Nova O.S.</span>
    </a>
  </div>
</nav>

<!-- Flash messages -->
<div class="flash-container">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert-{{ 'success' if category == 'success' else 'warning' }} alert-dismissible fade show shadow-sm" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endwith %}
</div>

<!-- Main content -->
<div id="main">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
